<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#12312d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="医療安全マニュアル必携 β版">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>医療安全マニュアル必携 β版</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css?v=20260622-lite-v2">
  </head>
  <body>
    <header class="mobile-header">
      <div class="brand-lockup">
        <img class="brand-logo" src="assets/yurino-logo-clean.webp" alt="" aria-hidden="true">
        <div>
          <p class="eyebrow">長崎百合野病院</p>
          <h1>医療安全マニュアル必携 β版</h1>
        </div>
      </div>
      <button id="menuButton" class="menu-button" type="button" aria-expanded="false" aria-controls="headerMenu" aria-label="メニューを開く">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
      <div id="headerMenu" class="header-actions" hidden>
        <div class="header-nav">
          <button id="homeButton" class="home-button" type="button" hidden>ホーム</button>
        </div>
        <div class="pwa-actions" aria-label="アプリ保存">
          <button id="installButton" class="utility-button" type="button" hidden>インストール</button>
          <button id="offlineButton" class="utility-button" type="button">オフライン保存</button>
          <span id="offlineStatus" class="offline-status" role="status">未保存</span>
        </div>
        <div class="mode-tabs" role="tablist" aria-label="マニュアル切替" hidden>
          <button class="mode-tab is-active" type="button" data-mode="pocket">ポケット</button>
          <button class="mode-tab" type="button" data-mode="disaster">災害</button>
        </div>
      </div>
    </header>

    <main class="mobile-shell">
      <section id="homeView" class="home-view" aria-label="マニュアル選択">
        <div class="home-search">
          <label class="search-label" for="homeSearchInput">全体検索</label>
          <input id="homeSearchInput" type="search" placeholder="ポケット・災害から検索" autocomplete="off">
          <div id="homeSearchResults" class="home-search-results" aria-live="polite"></div>
        </div>
        <div class="manual-cards">
          <a class="manual-card pocket-card" href="#pocket" data-card-mode="pocket">
            <span class="manual-card-label">医療安全</span>
            <span class="manual-card-title">ポケットマニュアル</span>
            <span class="manual-card-meta" id="pocketUpdated">最終更新日 2026年6月21日</span>
            <span class="manual-card-count" id="pocketCount">0件</span>
          </a>
          <a class="manual-card disaster-card" href="#disaster" data-card-mode="disaster">
            <span class="manual-card-label">災害対応</span>
            <span class="manual-card-title">災害マニュアル</span>
            <span class="manual-card-meta" id="disasterUpdated">最終更新日 2026年6月22日</span>
            <span class="manual-card-count" id="disasterCount">0件</span>
          </a>
        </div>
      </section>

      <section id="manualView" class="manual-view" hidden>
        <section class="controls">
          <label class="search-label" for="searchInput">検索</label>
          <input id="searchInput" type="search" placeholder="キーワード" autocomplete="off">
          <div id="chapterField" class="chapter-field">
            <label class="chapter-label" for="chapterSelect">チャプター選択</label>
            <select id="chapterSelect" class="chapter-select" aria-label="章を選択"></select>
          </div>
        </section>

        <section class="manual-layout">
          <aside class="item-panel" aria-label="項目一覧">
            <div id="itemList" class="item-list"></div>
          </aside>

        </section>
      </section>
    </main>

    <script src="data/manuals.js?v=20260622-lite-v2"></script>
    <script src="app.js?v=20260622-lite-v2"></script>
  </body>
</html>
