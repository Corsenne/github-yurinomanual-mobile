<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#12312d">
    <title>PDF | 医療安全マニュアル必携 β版</title>
    <link rel="stylesheet" href="styles.css?v=20260630-disaster-v1">
  </head>
  <body class="pdf-page">
    <header class="pdf-page-header">
      <div class="pdf-page-heading">
        <button id="viewerBackButton" class="pdf-page-back" type="button">← 一覧へ</button>
        <h1 id="pdfTitle" class="pdf-page-title">PDF</h1>
      </div>
      <div class="pdf-zoom-controls" role="toolbar" aria-label="PDF拡大縮小">
        <button id="zoomOutButton" class="pdf-zoom-button" type="button" aria-label="縮小">−</button>
        <span id="zoomLabel" class="pdf-zoom-label" role="status">100%</span>
        <button id="zoomInButton" class="pdf-zoom-button" type="button" aria-label="拡大">＋</button>
        <button id="zoomFitButton" class="pdf-zoom-fit" type="button">幅に合わせる</button>
      </div>
      <div class="pdf-page-controls" role="group" aria-label="チャプター内のページ移動">
        <button id="previousPageButton" class="pdf-page-nav" type="button">← 前へ</button>
        <span id="pageLabel" class="pdf-page-label" role="status">1 / 1</span>
        <button id="nextPageButton" class="pdf-page-nav" type="button">次へ →</button>
      </div>
    </header>
    <main class="pdf-page-main">
      <div id="pdfCanvasScroll" class="pdf-canvas-scroll" aria-busy="true" tabindex="0">
        <div id="pdfPages" class="pdf-pages"></div>
      </div>
      <p id="pdfLoading" class="pdf-message">PDFを読み込んでいます…</p>
      <p id="pdfError" class="pdf-message" hidden>PDFを開けませんでした。</p>
    </main>
    <script src="data/manuals.js?v=20260630-disaster-v1"></script>
    <script type="module" src="pdf-viewer.js?v=20260630-disaster-v1"></script>
  </body>
</html>
